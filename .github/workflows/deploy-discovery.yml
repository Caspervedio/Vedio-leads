name: Deploy Discovery Job

on:
  push:
    branches: [main]
    paths:
      - "scripts/discover-ads.js"
      - "scripts/discover-advertisers.js"
      - "Dockerfile.discovery"
      - ".github/workflows/deploy-discovery.yml"
      - "cloudbuild-discovery.yaml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

env:
  PROJECT_ID: vedio-444210
  REGION: europe-west1
  JOB_NAME: lead-discovery
  REPO: leads
  BUCKET: vedio-leads-data

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build discovery image
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/lead-discovery:${{ github.sha }}"
          gcloud builds submit \
            --project "$PROJECT_ID" \
            --config cloudbuild-discovery.yaml \
            --substitutions "_IMAGE=$IMAGE" \
            .

      - name: Deploy or update Cloud Run Job
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/lead-discovery:${{ github.sha }}"
          # `gcloud run jobs deploy` creates the job if missing, updates it
          # otherwise — same UX as `run deploy` for services.
          # Apify does the headless browser work, so we no longer need 2 vCPU +
          # 3Gi just to host chromium. Slimming down to 1 vCPU + 1Gi shaves
          # ~$0.40/run on baseline Cloud Run Jobs pricing.
          # DISCOVERY_LIMIT=300 is calibrated to STARTER tier ($29 credit,
          # $50 overage hard cap, $0.005/result BRONZE pricing):
          #   300 × ~1.05 (phase1 + ~5% phase2 tail) × 30 days × $0.005
          #     ≈ $47/mo, under the $50 overage cap with headroom for
          #     scheduler retries or unusually-high-hitrate days.
          # Yield estimate: ~6–9 fresh ICP-klar callable leads/day.
          gcloud run jobs deploy "$JOB_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE" \
            --task-timeout 7200 \
            --max-retries 1 \
            --cpu 1 \
            --memory 1Gi \
            --add-volume "name=data,type=cloud-storage,bucket=$BUCKET" \
            --add-volume-mount "volume=data,mount-path=/data" \
            --network=default \
            --subnet=leads-egress \
            --vpc-egress=all-traffic \
            --set-env-vars "DATA_DIR=/data,DISCOVERY_BUCKET=$BUCKET,DISCOVERY_LIMIT=300" \
            --set-secrets "DATAFORDELER_KEY=datafordeler-key:latest,APIFY_API_TOKEN=apify-api-token:latest"

      - name: Show job ARN
        run: gcloud run jobs describe "$JOB_NAME" --project "$PROJECT_ID" --region "$REGION" --format='value(name)'
