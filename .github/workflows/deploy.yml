name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: vedio-444210
  REGION: europe-west1
  SERVICE: leads
  REPO: leads
  BUCKET: vedio-leads-data

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build image with Cloud Build
        run: |
          gcloud builds submit \
            --project "$PROJECT_ID" \
            --tag "$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$SERVICE:${{ github.sha }}" \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$SERVICE:${{ github.sha }}" \
            --allow-unauthenticated \
            --port 3000 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --add-volume "name=data,type=cloud-storage,bucket=$BUCKET" \
            --add-volume-mount "volume=data,mount-path=/data" \
            --network=default \
            --subnet=leads-egress \
            --vpc-egress=all-traffic \
            --set-env-vars "DATA_DIR=/data,NODE_ENV=production,CVR_PROVIDER=datafordeler" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,DATAFORDELER_KEY=datafordeler-key:latest,KASPR_API_KEY=kaspr-api-key:latest,CLOUDTALK_API_KEY_ID=cloudtalk-api-key-id:latest,CLOUDTALK_API_KEY_SECRET=cloudtalk-api-key-secret:latest,CRON_SECRET=CRON_SECRET:latest"

      - name: Show service URL
        run: gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)'
